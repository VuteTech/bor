name: "bor-server"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
maintainer: "VuteTech <info@vutetech.com>"
description: |
  Bor Policy Management Server.
  Manages desktop policies and delivers them to enrolled agents.
homepage: "https://getbor.dev"
license: "LGPL-3.0-or-later"

contents:
  # Binary
  - src: server/server
    dst: /usr/bin/bor-server
    file_info:
      mode: 0755

  # Primary config file (single source of truth — preserved on upgrade)
  - src: server/server.yaml.example
    dst: /etc/bor/server.yaml
    type: config|noreplace
    file_info:
      mode: 0640

  # Systemd unit
  - src: packaging/systemd/bor-server.service
    dst: /lib/systemd/system/bor-server.service
    file_info:
      mode: 0644

  # Directories
  - dst: /etc/bor
    type: dir
    file_info:
      mode: 0755

  - dst: /var/lib/bor/pki
    type: dir
    file_info:
      mode: 0750

overrides:
  deb:
    depends:
      - postgresql
  rpm:
    depends:
      - postgresql-server
  apk:
    depends:
      - postgresql
  archlinux:
    depends:
      - postgresql

scripts:
  postinstall: packaging/scripts/postinstall-server.sh
  preremove: packaging/scripts/preremove-server.sh

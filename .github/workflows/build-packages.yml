name: CI

on:
  push:
    branches: ['**']
  pull_request:
  release:
    types: [published]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Test server
        run: cd server && go test ./...

      - name: Test agent
        run: cd agent && go test ./...

  build-server-backend:
    name: Build Server Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Build server backend
        run: cd server && go build ./...

  build-agent:
    name: Build Agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Build agent
        run: cd agent && go build ./...

  build-server-frontend:
    name: Build Server Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/web/frontend/package-lock.json

      - name: Install dependencies
        run: cd server/web/frontend && npm ci

      - name: Build
        run: cd server/web/frontend && npm run build

  build-packages:
    name: Build Packages (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [test, build-server-backend, build-server-frontend]
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64, ppc64le]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/web/frontend/package-lock.json

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Determine version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${SHORT_SHA}"
          fi
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: make packages VERSION=${{ steps.version.outputs.version }} ARCH=${{ matrix.arch }}

      - name: Upload packages as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: builds/
          retention-days: 30

      - name: Upload packages to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: builds/*

  build-image:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: [test, build-server-backend, build-server-frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${SHORT_SHA}"
          fi
          echo "version=${VERSION}"           >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"       >> "$GITHUB_OUTPUT"
          echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/master' || github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.event_name == 'release' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # master / release: build multi-platform and push to GHCR
      - name: Build and push (registry)
        if: github.ref == 'refs/heads/master' || github.event_name == 'release'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Containerfile
          platforms: linux/amd64,linux/arm64,linux/ppc64le
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.version }}

      # feature branches: build all platforms and export as an OCI archive
      # Load with: podman load -i bor-server.tar  or  skopeo copy oci-archive:bor-server.tar ...
      - name: Build and export (artifact)
        if: github.ref != 'refs/heads/master' && github.event_name != 'release'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Containerfile
          platforms: linux/amd64,linux/arm64,linux/ppc64le
          push: false
          tags: ghcr.io/${{ steps.version.outputs.repo_lc }}:${{ steps.version.outputs.version }}
          build-args: VERSION=${{ steps.version.outputs.version }}
          outputs: type=oci,dest=/tmp/bor-server.tar

      - name: Upload container image as artifact
        if: github.ref != 'refs/heads/master' && github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: container-${{ steps.version.outputs.version }}
          path: /tmp/bor-server.tar
          retention-days: 7

name: CI

on:
  push:
    branches: ['**']
  pull_request:
  release:
    types: [published]

jobs:
  # lint:
  #   name: Lint
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6

  #     - name: Set up Go
  #       uses: actions/setup-go@v6
  #       with:
  #         go-version-file: server/go.mod
  #         cache: true

  #     - name: Lint server
  #       uses: golangci/golangci-lint-action@v9
  #       with:
  #         working-directory: server
  #         version: latest

  #     - name: Lint agent
  #       uses: golangci/golangci-lint-action@v6
  #       with:
  #         working-directory: agent
  #         version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Test server
        run: cd server && go test ./...

      - name: Test agent
        run: cd agent && go test ./...

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Build server
        run: cd server && go build ./...

      - name: Build agent
        run: cd agent && go build ./...

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: server/web/frontend/package-lock.json

      - name: Install dependencies
        run: cd server/web/frontend && npm ci

      - name: Build
        run: cd server/web/frontend && npm run build

  build-image:
    name: Build Container Image
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/master' || github.event_name == 'release' }}
    needs: [test, build-backend, build-frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-packages:
    name: Build Packages (${{ matrix.arch }})
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/master' || github.event_name == 'release' }}
    needs: [test, build-backend, build-frontend]
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: server/web/frontend/package-lock.json

      - name: Install nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_linux_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz \
            | tar -xz -C /usr/local/bin nfpm

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages
        run: make packages VERSION=${{ steps.version.outputs.version }} ARCH=${{ matrix.arch }}

      - name: Upload packages as workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: builds/
          retention-days: 30

      - name: Upload packages to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: builds/*

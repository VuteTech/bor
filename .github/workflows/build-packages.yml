name: Build Packages

on:
  push:
    branches:
      - master
  release:
    types: [published]

jobs:
  build-packages:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: server/web/frontend/package-lock.json

      - name: Install nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin nfpm

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages
        run: make packages VERSION=${{ steps.version.outputs.version }} ARCH=${{ matrix.arch }}

      - name: Upload packages as workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: builds/
          retention-days: 30

      - name: Upload packages to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: builds/*

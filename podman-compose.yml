version: '3.8'

services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:17.6-alpine3.22
    container_name: bor-postgres
    environment:
      POSTGRES_USER: bor
      POSTGRES_PASSWORD: bor
      POSTGRES_DB: bor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── syslog-ng ─────────────────────────────────────────────────────────────
  # Receives Bor audit events over UDP and TCP 514 (RFC 5424).
  # All messages are printed to stdout (visible with `podman-compose logs -f syslog-ng`)
  # and written to /var/log/syslog-ng/ inside the container.
  #
  # Bor-specific events land in /var/log/syslog-ng/bor.log.
  # Use: podman exec bor-syslog-ng tail -f /var/log/syslog-ng/bor.log
  syslog-ng:
    image: docker.io/linuxserver/syslog-ng:4.10.2
    container_name: bor-syslog-ng
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ./dev/syslog-ng/syslog-ng.conf:/config/syslog-ng.conf
      - ./dev/syslog-ng/logs:/config/logs
    ports:
      # Port 514 is privileged; the container runs as UID 1000 and listens on
      # 5514 internally. Expose on localhost only — dev receiver, not production.
      - "127.0.0.1:5514:5514/udp"
      - "127.0.0.1:5514:5514/tcp"
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Containerfile
    container_name: bor-server
    depends_on:
      postgres:
        condition: service_healthy
      syslog-ng:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=bor
      - DB_PASSWORD=bor
      - DB_NAME=bor
      - DB_SSLMODE=disable
      - BOR_ENROLLMENT_PORT=8443
      - BOR_POLICY_PORT=8444
      # Comma-separated list of hostnames/IPs added as SANs to the
      # auto-generated TLS certificate. Set to your server's FQDN so
      # browsers and agents can verify the cert without warnings.
      # Overrides the 'hostnames' list in /etc/bor/server.yaml when set.
      - BOR_HOSTNAMES=localhost,10.28.7.134
      - BOR_METRICS_ADDR=0.0.0.0:9090

      # ── Audit syslog forwarding ───────────────────────────────────────────
      # Forward audit events to the local syslog-ng dev receiver.
      # Use BOR_AUDIT_SYSLOG_FORMAT=ocsf to switch to OCSF JSON format.
      - BOR_AUDIT_SYSLOG_ENABLED=true
      - BOR_AUDIT_SYSLOG_NETWORK=udp
      - BOR_AUDIT_SYSLOG_ADDR=syslog-ng:5514
      - BOR_AUDIT_SYSLOG_FORMAT=cef

      # ── WebAuthn / FIDO2 (optional) ───────────────────────────────────────
      # Enables hardware security keys (YubiKey, FIDO2 tokens) and software
      # passkey managers (Bitwarden, 1Password) as a second factor.
      # BOR_WEBAUTHN_RPID must equal the domain users browse to (no scheme/port).
      # BOR_WEBAUTHN_ORIGINS must include the full origin(s) of the login page.
      # Leave unset to keep WebAuthn disabled.
      - BOR_WEBAUTHN_RPID=localhost
      - BOR_WEBAUTHN_ORIGINS=https://localhost:8443
      - BOR_WEBAUTHN_DISPLAY_NAME=Bor Policy Manager
    ports:
      - "8443:8443"
      - "8444:8444"
      - "9090:9090"
    volumes:
      - bor_pki:/var/lib/bor/pki:U
    restart: unless-stopped

volumes:
  postgres_data:
  bor_pki:
